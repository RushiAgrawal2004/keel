name: Keel

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Keel
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Run Keel check
        run: |
          if [ -f graphify-out/graph.json ]; then
            keel check . --json --html
          else
            echo "graphify-out/graph.json not found; skipping Keel check"
          fi
      - name: Upload Keel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keel-report
          path: |
            keel-out/check-report.html
            keel-out/keel.sqlite3
