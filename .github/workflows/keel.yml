name: Keel

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Keel
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Run Keel check
        run: |
          if [ -f graphify-out/graph.json ]; then
            keel check . --json --html
            keel pr-comment .
            keel dashboard .
          else
            echo "graphify-out/graph.json not found; skipping Keel check"
          fi
      - name: Comment on pull request
        if: github.event_name == 'pull_request' && hashFiles('keel-out/pr-comment.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('keel-out/pr-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Upload Keel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keel-report
          if-no-files-found: ignore
          path: |
            keel-out/check-report.html
            keel-out/dashboard.html
            keel-out/pr-comment.md
            keel-out/keel.sqlite3
