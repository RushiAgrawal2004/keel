version: 1
project:
  name: demo-app
graph:
  provider: graphify
  path: graphify-out/graph.json
layers:
  UI:
  - src/components
  SERVICE:
  - src/services
  DATABASE:
  - src/db
  TEST:
  - tests
zones:
  user:
  - src/services
  - src/db
ignore:
- node_modules
- dist
- build
- coverage
approved_contracts:
- id: ui_never_touches_database
  title: UI must not access DATABASE directly
  source: discovered
  status: approved
  evidence:
    summary: 'UI has 9 nodes and DATABASE has 8; direct edges found: 0.'
    from_layer_nodes: 9
    to_layer_nodes: 8
    direct_edges_found: 0
  rule:
    forbid_edge:
      from_layer: UI
      to_layer: DATABASE
      relation: '*'
  repair:
    route_through_layer: SERVICE
